<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>Offline — 360IMS</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 48px 32px;
      }
      h1 { font-size: 1.75rem; margin-bottom: 12px; color: #f8fafc; }
      p { color: #cbd5e1; line-height: 1.6; margin-bottom: 24px; }
      .brand { color: #60a5fa; font-weight: 600; font-size: 0.875rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
      button {
        background: #1e3a5f;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 500;
      }
      button:hover { background: #2c5282; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">360IMS</div>
      <h1>You are offline</h1>
      <p>Connect to the internet to sync your inventory, quotes, and orders.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
